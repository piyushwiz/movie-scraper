name: Update releases

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update CSV and site
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python movie_scraper.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update release feed"
          file_pattern: docs/index.html docs/style.css docs/data/releases.csv
